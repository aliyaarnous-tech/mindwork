// 8 semaines d'historique + semaine en cours
const WEEKS = Array.from({length:9}, (_,i) => `S${i+8}`);

// Génère un score réaliste avec tendance
function genTeamHistory(teamId, baseTrend) {
  return WEEKS.map((w, i) => {
    const noise = (Math.sin(i + teamId.length) + 1) * 4;
    const score = Math.max(35, Math.min(92, baseTrend[i] + noise));
    return { week:w, score: Math.round(score) };
  });
}

/* =====================================================================
   3. SENTINEL — Questionnaire scientifiquement adossé
   Inspiré PSS-10 / MBI-GS / PHQ-9 (versions courtes)
   1 question est INVERSÉE (anti-fraude)
===================================================================== */
const SENTINEL_QUESTIONS = [
  { id:'q1', axis:'PSS', text:"Cette semaine, à quelle fréquence vous êtes-vous senti(e) dépassé(e) par ce que vous aviez à faire ?", inverted:false },
  { id:'q2', axis:'MBI-EE', text:"Vous êtes-vous senti(e) émotionnellement vidé(e) par votre travail ?", inverted:false },
  { id:'q3', axis:'MBI-EP', text:"Avez-vous ressenti que vous accomplissiez des choses utiles dans votre travail ?", inverted:true },
  { id:'q4', axis:'Recon', text:"Vous êtes-vous senti(e) reconnu(e) par votre hiérarchie ou vos collègues ?", inverted:true },
  { id:'q5', axis:'PHQ', text:"Avez-vous eu du mal à vous endormir ou à rester endormi(e) à cause du travail ?", inverted:false },
  { id:'q6', axis:'Charge', text:"Avez-vous eu le sentiment que votre charge de travail était soutenable ?", inverted:true },
  { id:'q7', axis:'Soutien', text:"Avez-vous pu compter sur le soutien de votre équipe en cas de difficulté ?", inverted:true },
  { id:'q8', axis:'PSS', text:"Vous êtes-vous senti(e) tendu(e), nerveux(se) ou irritable au travail ?", inverted:false },
];
const LIKERT = [
  { val:0, label:'Jamais',         emoji:'😌' },
  { val:1, label:'Rarement',       emoji:'🙂' },
  { val:2, label:'Parfois',        emoji:'😐' },
  { val:3, label:'Souvent',        emoji:'😟' },
  { val:4, label:'Très souvent',   emoji:'😩' },
];

// Score 0..100 (100 = excellent)
function computeScore(answers) {
  let total = 0, max = 0;
  SENTINEL_QUESTIONS.forEach(q => {
    const a = answers[q.id];
    if (a == null) return;
    const v = q.inverted ? (4 - a) : a;
    total += v;
    max += 4;
  });
  if (max === 0) return null;
  // 0 = très mauvais signal, donc on inverse: score bien-être = 100 - (total/max)*100
  return Math.round(100 - (total/max)*100);
}
function scoreLevel(s) {
  if (s == null) return { label:'—', color:'bg-gray-300', text:'text-gray-500' };
  if (s >= 70)   return { label:'Vert',   color:'bg-ok',     text:'text-ok',     hex:'#16A34A' };
  if (s >= 50)   return { label:'Orange', color:'bg-warn',   text:'text-warn',   hex:'#D97706' };
  return         { label:'Rouge',  color:'bg-danger', text:'text-danger', hex:'#DC2626' };
}

function SalSentinel({ onDone }) {
  const { state, setState } = useApp();
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [finished, setFinished] = useState(false);

  const q = SENTINEL_QUESTIONS[step];
  const progress = ((step+1)/SENTINEL_QUESTIONS.length)*100;
  const selected = answers[q?.id];

  const next = () => {
    if (step < SENTINEL_QUESTIONS.length-1) setStep(s=>s+1);
    else {
      const score = computeScore(answers);
      // ajoute à l'historique perso
      setState(prev => ({
        ...prev,
        myAnswers: [...prev.myAnswers, { week:`S${parseInt(prev.campaignWeek.slice(1))+1}`, score }],
        campaignWeek: `S${parseInt(prev.campaignWeek.slice(1))+1}`,
      }));
      setFinished(true);
    }
  };

  if (finished) {
    const sc = computeScore(answers);
    const lvl = scoreLevel(sc);
    return (
      <div className="text-center space-y-4 pt-6 fadein">
        <div className="text-5xl">✅</div>
        <h2 className="font-display text-2xl font-bold">Merci, c'est enregistré.</h2>
        <p className="text-sm text-gray-600 px-4">Vos réponses individuelles ne sont jamais transmises à votre employeur. Seuls les agrégats par équipe (≥5 personnes) sont communiqués.</p>
        <div className="my-6">
          <div className={`inline-flex items-center justify-center w-32 h-32 rounded-full ring-gradient`}
            style={{ '--g':lvl.hex, '--p':`${sc}%` }}>
            <div className="bg-white w-24 h-24 rounded-full flex items-center justify-center">
              <div>
                <div className={`font-display text-3xl font-bold ${lvl.text}`}>{sc}</div>
                <div className="text-[10px] text-gray-500">/100</div>
              </div>
            </div>
          </div>
          <div className="text-sm font-semibold mt-2">{lvl.label === 'Vert' ? 'Bon équilibre cette semaine' : lvl.label === 'Orange' ? 'Vigilance — quelques signaux à surveiller' : 'Signaux préoccupants — pensez à utiliser les ressources'}</div>
        </div>
        <button onClick={onDone} className="bg-ink text-white font-bold py-3 px-6 rounded-xl">Voir mon historique</button>
      </div>
    );
  }

  return (
    <div className="fadein">
      <div className="mb-5">
        <div className="flex justify-between text-xs text-gray-500 mb-2">
          <span>Question {step+1} / {SENTINEL_QUESTIONS.length}</span>
          <span>{Math.round(progress)}%</span>
        </div>
        <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
          <div className="h-full bg-gradient-to-r from-brand-600 to-accent transition-all" style={{ width:`${progress}%` }} />
        </div>
      </div>

      <Card className="p-6 mb-4">
        <div className="text-[10px] uppercase tracking-wider text-brand-600 font-bold">{q.axis}</div>
        <div className="font-bold text-base mt-2 leading-relaxed">{q.text}</div>
        <div className="space-y-2 mt-5">
          {LIKERT.map(o => (
            <button key={o.val}
              onClick={()=>setAnswers(a => ({...a, [q.id]:o.val}))}
              className={`w-full flex items-center gap-3 p-3.5 rounded-xl border-2 text-sm font-medium text-left transition
                ${selected===o.val ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-gray-200 hover:border-brand-400 hover:bg-brand-50/50'}`}>
              <span className="text-xl">{o.emoji}</span>
              <span>{o.label}</span>
            </button>
          ))}
        </div>
      </Card>

      <div className="bg-brand-50 border border-brand-100 rounded-xl p-3 text-[11px] text-brand-800 flex gap-2 mb-4">
        <span>🔒</span>
        <span>Réponses chiffrées · agrégées par équipe ≥5 · non transmissibles individuellement à l'employeur (RGPD).</span>
      </div>

      <button disabled={selected==null} onClick={next}
        className={`w-full py-4 rounded-xl font-bold text-white transition
          ${selected!=null ? 'bg-gradient-to-r from-brand-600 to-accent hover:opacity-95' : 'bg-gray-300 cursor-not-allowed'}`}>
        {step===SENTINEL_QUESTIONS.length-1 ? 'Envoyer mes réponses' : 'Question suivante →'}
      </button>
    </div>
  );
}

  const { state, setState } = useApp();
  const [name, setName] = useState(state.company.name);
  const [emp, setEmp] = useState(state.company.employees);
  const save = () => {
    setState(prev => ({ ...prev, company: { ...prev.company, name, employees: parseInt(emp)||prev.company.employees }}));
  };
  return (
    <div className="fadein max-w-2xl">
      <SectionTitle kicker="Paramètres" title="Configuration de l'entreprise" />
      <Card className="p-6 space-y-4">
        <div>
          <label className="text-xs uppercase tracking-wider text-gray-500 font-semibold">Raison sociale</label>
          <input value={name} onChange={e=>setName(e.target.value)} className="w-full mt-1.5 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label className="text-xs uppercase tracking-wider text-gray-500 font-semibold">Effectif</label>
          <input type="number" value={emp} onChange={e=>setEmp(e.target.value)} className="w-full mt-1.5 border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <button onClick={save} className="bg-ink text-white text-sm font-semibold px-4 py-2 rounded-lg">Enregistrer</button>
        <div className="text-xs text-gray-500">Modifications enregistrées dans votre navigateur (localStorage).</div>
      </Card>
    </div>
  );
}

/* =====================================================================
   12. ROOT
===================================================================== */
function Root() {
  const { role } = useApp();
  if (!role) return <RoleSelect />;
  if (role==='salarie') return <SalarieView />;
  if (role==='manager') return <ManagerView />;
  if (role==='rh')      return <RHView />;
  if (role==='admin')   return <AdminView />;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><Root /></AppProvider>
);
</script>
</body>
</html>
